version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: my-video-site-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: my_video_site
      MYSQL_USER: videouser
      MYSQL_PASSWORD: videopass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/init-database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-video-site-app
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_USER: videouser
      DB_PASSWORD: videopass123
      DB_NAME: my_video_site
      JWT_SECRET: your_secret_key_change_in_production
      REFRESH_TOKEN_SECRET: your_refresh_secret_change_in_production
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: my-video-site-bucket
      CORS_ORIGIN: http://localhost:3000,http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - app-network
    command: npm run dev

  frontend:
    image: nginx:alpine
    container_name: my-video-site-frontend
    ports:
      - "3000:80"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge